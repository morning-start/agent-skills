# Copyright Assist 配置文件
# 基于中国版权保护中心（ccopyright.com.cn）官方要求

# 忽略的目录（扫描代码时跳过）
ignore_dirs:
  - node_modules
  - .git
  - .venv
  - venv
  - env
  - __pycache__
  - dist
  - build
  - target
  - .idea
  - .vscode
  - vendor
  - third_party
  - logs
  - tmp
  - temp
  - cache
  - .cache

# 支持的代码文件扩展名
code_extensions:
  - .py
  - .java
  - .c
  - .cpp
  - .h
  - .js
  - .ts
  - .jsx
  - .tsx
  - .go
  - .rs
  - .rb
  - .php
  - .swift
  - .kt
  - .scala
  - .cs
  - .m
  - .mm
  - .dart
  - .lua
  - .sql
  - .sh
  - .bat
  - .ps1

# 支持的截图文件格式
screenshot_extensions:
  - .png
  - .jpg
  - .jpeg
  - .gif
  - .bmp
  - .webp

# 支持的文档文件格式
document_extensions:
  - .md
  - .txt
  - .doc
  - .docx
  - .pdf
  - .rst

# 软著申请官方要求（中国版权保护中心）
copyright_requirements:
  # 源代码文档要求
  min_total_lines: 3000        # 总行数≥3000行才需提交前30页+后30页
  pages_per_section: 30         # 前部/后部各30页
  lines_per_page: 50            # 每页不少于50行（含空行和注释）
  
  # 说明书文档要求
  manual_min_pages: 15          # 说明书最少页数（建议15页以上，推荐60页）
  manual_recommended_pages: 60  # 说明书推荐页数
  
  # 文件格式
  upload_format: pdf            # 仅支持PDF格式上传
  signature_method: handwritten # 签章页需手写签名（不可用电子签名）

# 资源检查阈值
resource_thresholds:
  code_min_files: 1             # 最少代码文件数
  screenshot_min_count: 5       # 最少截图数量
  screenshot_min_size_kb: 50    # 最少截图大小（KB），小于此值可能分辨率不足
  screenshot_recommended_size_kb: 100  # 推荐截图大小（KB）

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"

# 输出配置
output:
  code:
    encoding: utf-8
    line_number_width: 4
  report:
    format: json
    indent: 2

# 版本管理（支持多版本软著申请）
version:
  default: "1.0.0"
  enabled: true
  organize_by_version: true

# 参考文档链接
reference_links:
  source_code_format: "references/source-code-format.md"
  user_manual_guide: "references/user-manual-guide.md"
  design_manual_guide: "references/design-manual-guide.md"
  operation_manual_guide: "references/operation-manual-guide.md"

# 申请平台信息
platform:
  name: "中国版权保护中心"
  url: "https://www.ccopyright.com.cn/"
  form: "R11-计算机软件著作权登记申请"
  review_period_days: 60        # 自受理日起60日内审查完成
  estimated_total_months: 3     # 建议提前3个月申请
